<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" role="img" aria-label="Junior_IT - course banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="70%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd60a"/>
      <stop offset="50%" stop-color="#ff8a50"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd60a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd60a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffc8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ffc8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0096" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff0096" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffd60a" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <radialGradient id="gridMask" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </radialGradient>
    <mask id="fadeMask">
      <rect width="1200" height="380" fill="url(#gridMask)"/>
    </mask>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#grid)" mask="url(#fadeMask)"/>

  <ellipse cx="180" cy="120" rx="320" ry="220" fill="url(#glow1)"/>
  <ellipse cx="1050" cy="280" rx="340" ry="220" fill="url(#glow3)"/>
  <ellipse cx="600" cy="220" rx="280" ry="180" fill="url(#glow2)"/>

  <g font-family="ui-monospace, monospace" font-size="11" fill="#ffd60a" opacity="0.18">
    <text x="40" y="50">&lt;!DOCTYPE html&gt;</text>
    <text x="40" y="68">&lt;html lang="ru"&gt;</text>
    <text x="40" y="86">  &lt;style&gt;</text>
    <text x="40" y="104">    body { color: gold; }</text>
    <text x="40" y="122">  &lt;/style&gt;</text>
    <text x="40" y="140">&lt;/html&gt;</text>
  </g>

  <g font-family="ui-monospace, monospace" font-size="11" fill="#00ffc8" opacity="0.2">
    <text x="1010" y="320">function level_up() {</text>
    <text x="1010" y="338">  return YOU + skill;</text>
    <text x="1010" y="356">}</text>
  </g>

  <g font-family="ui-monospace, monospace" font-size="14" fill="#ffd60a" letter-spacing="6">
    <rect x="400" y="85" width="400" height="32" rx="16" fill="#ffd60a" opacity="0.08"/>
    <text x="600" y="106" text-anchor="middle" font-weight="700">// JUNIOR DEV TRAINING · 11 TO 14</text>
  </g>

  <g font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-weight="700">
    <text x="600" y="208" text-anchor="middle" font-size="98"
          fill="#ffd60a" opacity="0.18" filter="url(#textGlow)" letter-spacing="-3">Junior_IT</text>
    <text x="600" y="208" text-anchor="middle" font-size="98"
          fill="url(#titleGrad)" letter-spacing="-3">Junior_IT</text>
  </g>

  <g font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif">
    <text x="600" y="252" text-anchor="middle" font-size="22" fill="#e8ecf5" font-weight="500">
      HTML, CSS, JS and your first real website
    </text>
    <text x="600" y="280" text-anchor="middle" font-size="15" fill="#8892a8" font-weight="400">
      Free webinar course · No cramming · One working site per lesson
    </text>
  </g>

  <g font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(380, 310)">
      <rect width="86" height="34" rx="17" fill="#ff5722" opacity="0.95"/>
      <text x="43" y="22" text-anchor="middle" fill="#fff">HTML</text>
    </g>
    <g transform="translate(476, 310)">
      <rect width="76" height="34" rx="17" fill="#1572B6" opacity="0.95"/>
      <text x="38" y="22" text-anchor="middle" fill="#fff">CSS</text>
    </g>
    <g transform="translate(562, 310)">
      <rect width="62" height="34" rx="17" fill="#F7DF1E"/>
      <text x="31" y="22" text-anchor="middle" fill="#0a0a14" font-weight="700">JS</text>
    </g>
    <g transform="translate(634, 310)">
      <rect width="86" height="34" rx="17" fill="none" stroke="#ffd60a" stroke-width="1.5"/>
      <text x="43" y="22" text-anchor="middle" fill="#ffd60a">75 MIN</text>
    </g>
    <g transform="translate(730, 310)">
      <rect width="90" height="34" rx="17" fill="#00e676"/>
      <circle cx="14" cy="17" r="4" fill="#0a0a14"/>
      <text x="55" y="22" text-anchor="middle" fill="#0a0a14" font-weight="700">LIVE</text>
    </g>
  </g>

  <g stroke="#ffd60a" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 24 24 L 24 60 M 24 24 L 60 24"/>
    <path d="M 1176 24 L 1176 60 M 1176 24 L 1140 24"/>
    <path d="M 24 356 L 24 320 M 24 356 L 60 356"/>
    <path d="M 1176 356 L 1176 320 M 1176 356 L 1140 356"/>
  </g>

  <text x="600" y="368" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10"
        fill="#8892a8" letter-spacing="4" opacity="0.7">
    DmitrTRC/Junior_IT · MIT
  </text>
</svg>
